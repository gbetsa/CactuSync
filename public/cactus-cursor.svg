<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="48" height="48">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#4a4e40" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Ponto de origem: topo do cacto alinhado ao 0,0 com rotação -->
  <g filter="url(#shadow)" transform="translate(2, 2) rotate(-20) scale(0.9)">
    
    <!-- Corpo do cacto principal -->
    <path d="M12 2 L16 2 L16 18 L12 18 Z" fill="#6b705c" rx="2" />
    <path d="M12 2 Q 14 -1 16 2" fill="#6b705c" />
    <path d="M12 18 Q 14 20 16 18" fill="#6b705c" />

    <!-- Braço Esquerdo -->
    <path d="M12 10 Q8 10 9 6" fill="none" stroke="#6b705c" stroke-width="2.5" stroke-linecap="round" />

    <!-- Braço Direito -->
    <path d="M16 13 Q20 13 19 8" fill="none" stroke="#6b705c" stroke-width="2.5" stroke-linecap="round" />

    <!-- Detalhes do cacto / Espinhos -->
    <circle cx="14" cy="5" r="0.8" fill="#fdf0e6" opacity="0.8" />
    <circle cx="14" cy="9" r="0.8" fill="#fdf0e6" opacity="0.8" />
    <circle cx="14" cy="13" r="0.8" fill="#fdf0e6" opacity="0.8" />
    <circle cx="14" cy="17" r="0.8" fill="#fdf0e6" opacity="0.8" />
    
    <circle cx="9" cy="7" r="0.6" fill="#fdf0e6" opacity="0.8" />
    <circle cx="19" cy="9" r="0.6" fill="#fdf0e6" opacity="0.8" />
    
    <!-- Base (estilo de flecha do mouse) -->
    <path d="M8 18 L20 18 L14 24 Z" fill="#b7b7a4" />
  </g>
</svg>
